name: Secret Detection - Gitleaks

on:
  workflow_call:
    inputs:
      log-opts:
        required: false
        type: string
        default: ''
      mode:
        required: false
        type: string
        default: diff
      version:
        required: false
        type: string
        default: 8.24.3

jobs:
  secret-detection-gitleaks:
    name: Secret Detection - Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${{ inputs.version }}/gitleaks_${{ inputs.version }}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks scan
        shell: bash
        run: |
          set -euo pipefail

          cmd=(
            gitleaks git .
            --exit-code 0
            --report-format sarif
            --report-path gitleaks-results.sarif
            --redact
            --verbose
          )

          if [[ "${{ inputs.mode }}" == "diff" && -n "${{ inputs.log-opts }}" ]]; then
            cmd+=(--log-opts="${{ inputs.log-opts }}")
          fi

          "${cmd[@]}"

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-detection-gitleaks
          path: gitleaks-results.sarif
          retention-days: 30
