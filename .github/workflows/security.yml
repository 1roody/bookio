name: Security Tests

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  sca-npm-audit:
    name: SCA - npm audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=moderate || true
          cat npm-audit-report.json

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: sca-npm-audit
          path: npm-audit-report.json
          retention-days: 30

  secret-detection-gitleaks:
    name: Secret Detection - Gitleaks
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks scan
        id: gitleaks
        run: |
          gitleaks detect \
            --source . \
            --exit-code 0 \
            --report-format sarif \
            --report-path gitleaks-results.sarif \
            --redact \
            --verbose

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-detection-gitleaks
          path: gitleaks-results.sarif
          retention-days: 30

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    continue-on-error: true
    if: (github.actor != 'dependabot[bot]')
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: |
          python3 -m pip install --quiet semgrep

      - name: Run Semgrep scan
        id: semgrep
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-semgrep
          path: semgrep-results.sarif
          retention-days: 30

  container-scan-trivy:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: bookio-backend:scan

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bookio-backend:scan
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-scan-trivy
          path: trivy-results.sarif
          retention-days: 30
