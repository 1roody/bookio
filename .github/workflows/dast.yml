name: DAST

on:
  workflow_call:

jobs:
  dast-owasp-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start test environment
        run: |
          docker compose -f docker-compose.dast.yml up -d
          echo "Waiting for services to be ready..."
          sleep 10

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health 2>/dev/null; then
              echo "Services healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Proceeding anyway..."

      - name: Pull ZAP image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p zap-output && chmod 777 zap-output

          docker run --rm \
            --network host \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8080 \
              -r zap-report.html \
              -J zap-report.json \
              -a \
              -I

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-zap-results
          path: |
            zap-output/zap-report.html
            zap-output/zap-report.json
          retention-days: 30

      - name: Cleanup test environment
        if: always()
        run: docker compose -f docker-compose.dast.yml down -v
