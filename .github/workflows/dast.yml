name: DAST

on:
  workflow_run:
    workflows: [Build and Deploy, Security Tests]
    types: [completed]
    branches:
      - main

jobs:
  dast-owasp-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start test environment
        run: |
          docker-compose -f docker-compose.dast.yml up -d
          echo "Waiting for services to be ready..."
          sleep 10

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/health 2>/dev/null; then
              echo "Services healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Services ready for testing"

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-a'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dast-zap-results
          path: report_md.md
          retention-days: 30

      - name: Cleanup test environment
        if: always()
        run: docker-compose -f docker-compose.dast.yml down -v

  dast-summary:
    name: DAST Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [dast-owasp-zap]
    steps:
      - name: Summary
        run: |
          echo "DAST Test Summary"
          echo "================="
          echo "OWASP ZAP: ${{ needs.dast-owasp-zap.result }}"
          echo "Status: Tests completed"
